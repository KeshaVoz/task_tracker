name: Build and Push All Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: task_manager_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/task_manager_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis
      REDIS_DB: 0
      REDIS_URL: redis://:redis@redis:6379/0
      JWT_SECRET: super-secret
      JWT_ALG: HS256
      ACCESS_TOKEN_TTL_MIN: 15
      REFRESH_TOKEN_TTL_DAYS: 7
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 465
      SMTP_USERNAME: kesha.voz@ya.ru
      SMTP_PASSWORD: qdcygdrkacriobzj
      SMTP_FROM: kesha.voz@ya.ru
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      KAFKA_URL: kafka:29092
      SUMMARY_DB_HOST: db-summarization
      SUMMARY_DB_PORT: 5432
      SUMMARY_DB_NAME: summarization_db
      SUMMARY_DB_USER: postgres
      SUMMARY_DB_PASSWORD: postgres
      SUMMARY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-summarization:5432/summarization_db
      LLM_CREDENTIALS: MDE5ZjBlNGUtMTJjMi03M2Y0LWExOWMtMTFmZWI3NTNkMTAyOjJmM2QxMjhiLTVkNDEtNGMyNC1hNTAzLWEzMzdkMDAyYTVhNQ==
      LLM_MODEL: GigaChat
      ALLOWED_ORIGINS: '["http://localhost", "http://localhost:8080"]'
    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Set short git commit SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3


    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}


    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' 


    - name: Run Backend Tests
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m pytest app/tests/ -v -s

    - name: Run Summarization Service Tests
      run: |
        pip install -r ./summarization-service/requirements.txt
        export PYTHONPATH=$GITHUB_WORKSPACE/summarization-service
        python -m pytest ./summarization-service/app/tests/ -v -s


    - name: Build and push backend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/task-tracker-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/task-tracker-backend:${{ steps.vars.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


    - name: Build and push summarization service
      uses: docker/build-push-action@v6
      with:
        context: ./summarization-service
        file: ./summarization-service/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/task-tracker-summarization:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/task-tracker-summarization:${{ steps.vars.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


    - name: Build and push frontend
      uses: docker/build-push-action@v6
      with:
        context: ./task-tracker-frontend
        file: ./task-tracker-frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/task-tracker-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/task-tracker-frontend:${{ steps.vars.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max