services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - api

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - api

  api:
    image: keshavoznesensky/task-tracker-backend:${IMAGE_TAG:-latest}
    env_file: .env
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:                         
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - api

  celery-worker:
    image: keshavoznesensky/task-tracker-backend:${IMAGE_TAG:-latest}
    command: ["celery", "-A", "app.celery_client", "worker", "-Q", "celery", "-l", "info"]
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - api

  celery-beat:
    image: keshavoznesensky/task-tracker-backend:${IMAGE_TAG:-latest}
    command: ["celery", "-A", "app.celery_client", "beat", "-l", "info"]
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - api

  celery-rpc-receiver:
    image: keshavoznesensky/task-tracker-backend:${IMAGE_TAG:-latest}
    command: python app/consumers/summary_response_consumer.py
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always
    networks:
      - api

  frontend:
    image: keshavoznesensky/task-tracker-frontend:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: always
    networks:
      - api

  db-summarization:
    image: postgres:15
    environment:
      POSTGRES_DB: ${SUMMARY_DB_NAME}
      POSTGRES_USER: ${SUMMARY_DB_USER}
      POSTGRES_PASSWORD: ${SUMMARY_DB_PASSWORD}
    volumes:
      - postgres_summary_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUMMARY_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api
      
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api
    
  summarization-service:
    image: keshavoznesensky/task-tracker-summarization:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      db-summarization:
        condition: service_healthy
    restart: always
    networks:
      - api

volumes:
  postgres_data:
  redis_data:
  postgres_summary_data:

networks:
  api:
    driver: bridge
