<!DOCTYPE html>
<html>
<head>
    <title>Tasks - Planner</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="main-app">
    <div id="loading" class="loading">Loading tasks...</div>

    <div id="mainContent" class="hidden">
        <div class="main-content">
            <header>
                <h1>My Tasks</h1>
                <div class="user-info">
                    <span id="currentUser"></span>
                    <button id="logoutBtn">Logout</button>
                </div>
            </header>

            <section class="tasks-section">
                <div class="add-task-form" style="display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap;">
                    <input type="text" id="newTaskTitle" placeholder="Task title..." maxlength="200" style="flex: 2; min-width: 250px;">
                    <textarea id="newTaskDescription" placeholder="Description (optional)..." maxlength="1000" rows="2" style="flex: 3; min-width: 300px; resize: vertical;"></textarea>
                    <button id="addTaskBtn">Add Task</button>
                </div>

                <div class="tasks-list" id="tasksList"></div>
                <div id="emptyState" class="empty-state hidden">
                    <div>No tasks yet</div>
                    <div>Add your first task above!</div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/tasks.js"></script>
</body>
</html>
