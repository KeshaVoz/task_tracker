<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Manager</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1>Login</h1>
            <p>Welcome back</p>
            
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            
            <div class="auth-link">
                Don't have account? <a href="/register">Register here</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/auth.js"></script> 
    <script>
    $('#loginForm').submit(function(e) {
        e.preventDefault();
        const email = $('#loginEmail').val();
        const password = $('#loginPassword').val();
        login(email, password);  
    });

    // 🔥 АВТОПРОВЕРКА + РЕДИРЕКТ ПРИ ТОКЕНЕ
    $(document).ready(async function() {
        console.log('🔍 Login page: checking existing auth...');
        
        try {
            // Проверяем токен/refresh → получаем user
            const user = await window.checkAuth();
            console.log('✅ Token valid/updated, redirecting to tasks:', user.email);
            window.location.href = '/tasks';  // РЕДИРЕКТ!
        } catch (error) {
            console.log('❌ No valid auth, show login form');
            // Форма уже видна — ничего не делаем
        }
    });
</script>
</body>
</html>
